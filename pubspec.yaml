environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  args: ^2.7.0
  mason_logger: ^0.3.5
  path: ^1.9.1
  yaml: ^3.1.3

dev_dependencies:
  lints: ^3.0.0
  test: ^1.24.0

executables:
  clean_arch: main
